name: Validate Geofeed PR

on:
  pull_request_target:
    paths:
      - 'feeds/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Checkout trusted base
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        id: dependencies
        run: pip install requests pyyaml pycountry==24.6.1

      - name: Prepare PR feed files
        id: prepare
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const pr = context.payload.pull_request;
            if (!pr) {
              core.setFailed('Missing pull request payload.');
              return;
            }

            // Only direct feed YAML files are materialized into the trusted checkout.
            // This prevents path traversal and keeps fork-controlled scripts/workflows out.
            const safeFeedPath = /^feeds\/[A-Za-z0-9][A-Za-z0-9._-]*\.yml$/;
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              }
            );

            const added = [];
            const modified = [];
            const deleted = [];
            const filesToValidate = [];
            const filesToDownload = new Set();

            const addUnique = (items, value) => {
              if (value && !items.includes(value)) {
                items.push(value);
              }
            };

            for (const file of changedFiles) {
              const feedPaths = [file.filename, file.previous_filename]
                .filter(Boolean)
                .filter((filename) => filename.startsWith('feeds/'));

              for (const filename of feedPaths) {
                if (!safeFeedPath.test(filename)) {
                  core.setFailed(`Unsafe or unsupported feed path: ${filename}`);
                  return;
                }
              }

              if (feedPaths.length === 0) {
                continue;
              }

              switch (file.status) {
                case 'added':
                case 'copied':
                  addUnique(added, file.filename);
                  addUnique(filesToValidate, file.filename);
                  filesToDownload.add(file.filename);
                  break;
                case 'modified':
                case 'changed':
                  addUnique(modified, file.filename);
                  addUnique(filesToValidate, file.filename);
                  filesToDownload.add(file.filename);
                  break;
                case 'removed':
                  addUnique(deleted, file.filename);
                  break;
                case 'renamed':
                  if (!file.previous_filename) {
                    core.setFailed(`Renamed file is missing previous_filename: ${file.filename}`);
                    return;
                  }
                  addUnique(deleted, file.previous_filename);
                  addUnique(added, file.filename);
                  addUnique(filesToValidate, file.filename);
                  filesToDownload.add(file.filename);
                  break;
                default:
                  core.setFailed(`Unsupported file status '${file.status}' for ${file.filename}`);
                  return;
              }
            }

            const [headOwner, headRepo] = pr.head.repo.full_name.split('/');
            const workspace = path.resolve(process.env.GITHUB_WORKSPACE);
            const feedsRoot = path.join(workspace, 'feeds') + path.sep;

            for (const filename of filesToDownload) {
              const destination = path.resolve(workspace, filename);
              if (!destination.startsWith(feedsRoot)) {
                core.setFailed(`Refusing to write outside feeds/: ${filename}`);
                return;
              }

              const response = await github.rest.repos.getContent({
                owner: headOwner,
                repo: headRepo,
                path: filename,
                ref: pr.head.sha,
              });
              const content = response.data;

              if (
                Array.isArray(content) ||
                content.type !== 'file' ||
                content.encoding !== 'base64' ||
                !content.content
              ) {
                core.setFailed(`Unable to read regular file content for ${filename}`);
                return;
              }

              fs.mkdirSync(path.dirname(destination), { recursive: true });
              fs.writeFileSync(
                destination,
                Buffer.from(content.content.replace(/\n/g, ''), 'base64')
              );
            }

            let verified = 'false';
            let email = 'null';
            try {
              const commit = await github.rest.repos.getCommit({
                owner: headOwner,
                repo: headRepo,
                ref: pr.head.sha,
              });
              verified = String(commit.data.commit.verification?.verified === true);
              email = commit.data.commit.author?.email || 'null';
            } catch (error) {
              core.warning(`Unable to read PR head commit metadata: ${error.message}`);
            }

            core.setOutput('added', added.join(' '));
            core.setOutput('modified', modified.join(' '));
            core.setOutput('deleted', deleted.join(' '));
            core.setOutput('files', filesToValidate.join(' '));
            core.setOutput('verified', verified);
            core.setOutput('email', email);

      - name: Security Check
        id: security
        if: always() && steps.prepare.outcome == 'success'
        env:
          MODIFIED: ${{ steps.prepare.outputs.modified }}
          DELETED: ${{ steps.prepare.outputs.deleted }}
          EMAIL: ${{ steps.prepare.outputs.email }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          ARGS=(--base-sha "$BASE_SHA")
          HAS_FILES=false

          if [[ -n "$EMAIL" && "$EMAIL" != "null" ]]; then
            ARGS+=(--author-email "$EMAIL")
          fi

          if [[ -n "$MODIFIED" ]]; then
            read -r -a MODIFIED_FILES <<< "$MODIFIED"
            ARGS+=(--modified "${MODIFIED_FILES[@]}")
            HAS_FILES=true
          fi

          if [[ -n "$DELETED" ]]; then
            read -r -a DELETED_FILES <<< "$DELETED"
            ARGS+=(--deleted "${DELETED_FILES[@]}")
            HAS_FILES=true
          fi

          if [[ "$HAS_FILES" == false ]]; then
            echo "No modified or deleted files, skipping security check."
            echo "result=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if OUTPUT=$(python scripts/check_pr_security.py "${ARGS[@]}" 2>&1); then
            EXIT_CODE=0
          else
            EXIT_CODE=$?
          fi

          DELIMITER="GH_OUTPUT_$(python -c 'import uuid; print(uuid.uuid4().hex)')"
          {
            printf 'comment<<%s\n' "$DELIMITER"
            printf '%s\n' "$OUTPUT"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

          if [[ $EXIT_CODE -ne 0 ]]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Validation
        id: validation
        if: always() && steps.prepare.outcome == 'success'
        env:
          FILES: ${{ steps.prepare.outputs.files }}
          VERIFIED: ${{ steps.prepare.outputs.verified }}
          EMAIL: ${{ steps.prepare.outputs.email }}
        run: |
          if [[ -z "$FILES" ]]; then
            echo "No feed files to validate."
            echo "result=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          read -r -a FEED_FILES <<< "$FILES"
          ALL_PASSED=true
          COMMENTS=""

          for file in "${FEED_FILES[@]}"; do
            if [[ ! -f "$file" ]]; then
              printf 'Missing prepared feed file: %s\n' "$file"
              ALL_PASSED=false
              continue
            fi

            echo "Validating $file..."
            if OUTPUT=$(python scripts/validate_feed.py "$file" "$EMAIL" "$VERIFIED" 2>&1); then
              EXIT_CODE=0
            else
              EXIT_CODE=$?
            fi

            COMMENTS+=$'\n\n'"### Validation for \`$file\`"$'\n'
            if [[ $EXIT_CODE -eq 0 ]]; then
              COMMENTS+=$'✅ **Passed**\n```text\n'"$OUTPUT"$'\n```'
            else
              COMMENTS+=$'❌ **Failed**\n```text\n'"$OUTPUT"$'\n```'
              ALL_PASSED=false
            fi
          done

          DELIMITER="GH_OUTPUT_$(python -c 'import uuid; print(uuid.uuid4().hex)')"
          {
            printf 'comment<<%s\n' "$DELIMITER"
            printf '%s\n' "$COMMENTS"
            printf '%s\n' "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

          if [[ "$ALL_PASSED" == false ]]; then
            echo "result=fail" >> "$GITHUB_OUTPUT"
          else
            echo "result=pass" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: always() && steps.prepare.outcome == 'success' && (steps.security.outputs.comment != '' || steps.validation.outputs.comment != '')
        uses: actions/github-script@v7
        env:
          SECURITY_COMMENT: ${{ steps.security.outputs.comment }}
          SECURITY_RESULT: ${{ steps.security.outputs.result }}
          VALIDATION_COMMENT: ${{ steps.validation.outputs.comment }}
        with:
          script: |
            let body = '';

            const security = process.env.SECURITY_COMMENT;
            const securityResult = process.env.SECURITY_RESULT;
            const validation = process.env.VALIDATION_COMMENT;

            if (security) {
              const icon = securityResult === 'fail' ? '🚨' : '✅';
              body += `## ${icon} Security Check\n\`\`\`text\n${security}\n\`\`\`\n\n`;
            }

            if (validation) {
              body += `## 📋 Validation Results\n${validation}`;
            }

            if (body) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Fail if checks did not pass
        if: always()
        env:
          CHECKOUT_OUTCOME: ${{ steps.checkout.outcome }}
          SETUP_PYTHON_OUTCOME: ${{ steps.setup-python.outcome }}
          DEPENDENCIES_OUTCOME: ${{ steps.dependencies.outcome }}
          PREPARE_OUTCOME: ${{ steps.prepare.outcome }}
          SECURITY_OUTCOME: ${{ steps.security.outcome }}
          SECURITY_RESULT: ${{ steps.security.outputs.result }}
          VALIDATION_OUTCOME: ${{ steps.validation.outcome }}
          VALIDATION_RESULT: ${{ steps.validation.outputs.result }}
        run: |
          FAILED=false

          if [[ "$CHECKOUT_OUTCOME" != "success" ]]; then
            echo "::error::Trusted base checkout failed."
            FAILED=true
          fi

          if [[ "$SETUP_PYTHON_OUTCOME" != "success" ]]; then
            echo "::error::Python setup failed."
            FAILED=true
          fi

          if [[ "$DEPENDENCIES_OUTCOME" != "success" ]]; then
            echo "::error::Dependency installation failed."
            FAILED=true
          fi

          if [[ "$PREPARE_OUTCOME" != "success" ]]; then
            echo "::error::Failed to safely prepare PR feed files."
            FAILED=true
          fi

          if [[ "$SECURITY_OUTCOME" != "success" || "$SECURITY_RESULT" == "fail" ]]; then
            echo "::error::Security check failed."
            FAILED=true
          fi

          if [[ "$VALIDATION_OUTCOME" != "success" || "$VALIDATION_RESULT" == "fail" ]]; then
            echo "::error::Validation failed."
            FAILED=true
          fi

          if [[ "$FAILED" == true ]]; then
            exit 1
          fi
